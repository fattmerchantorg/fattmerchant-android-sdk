name: Publish to Maven Central

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 2.7.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Decode GPG key
      env:
        GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
      run: |
        mkdir -p ~/.gnupg
        echo "$GPG_KEY_BASE64" | base64 --decode > ~/.gnupg/secring.gpg
        chmod 600 ~/.gnupg/secring.gpg
    
    - name: Build all modules
      run: ./gradlew clean build --no-daemon
    
    - name: Run tests
      run: ./gradlew test --no-daemon
    
    - name: Publish to Maven Central
      env:
        OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
        SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      run: ./gradlew publish --no-daemon
    
    - name: Create Release Summary
      if: success()
      run: |
        echo "### ✅ Published to Maven Central" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
        echo "- \`com.fattmerchant:cardpresent:${{ github.event.inputs.version || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`com.fattmerchant:tokenization:${{ github.event.inputs.version || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⏳ Artifacts will be available on Maven Central in 2-4 hours." >> $GITHUB_STEP_SUMMARY
